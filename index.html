<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyMart in China: Partnership Dashboard</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM (Highly Stable CDNJS Versions) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- PropTypes (Required for Recharts) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    
    <!-- Recharts (Locked to stable 2.1.9 for guaranteed browser compatibility) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.1.9/Recharts.js"></script>

    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .loading-screen { display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; color: #475569; }
        
        /* Map specific styling */
        .china-map-bg {
            /* Points to your downloaded map image in the same folder */
            background-image: url('./china-map.jpg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    
    <!-- React App Root -->
    <div id="root">
        <div class="loading-screen">
            <i class="fas fa-circle-notch fa-spin text-4xl mb-4 text-[#00A54F]"></i>
            <h2 class="text-xl font-bold">Loading Dashboard...</h2>
        </div>
    </div>

    <!-- React Application Code -->
    <script type="text/babel">
        try {
            // Use window explicitly to prevent ReferenceErrors
            const { useState } = window.React;
            const { 
              BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
              PieChart, Pie, Cell, AreaChart, Area, ComposedChart
            } = window.Recharts;

            // --- Data Extracts from the Case Study ---
            const marketGrowthData = [
              { year: '2016', stores: 94000, growth: 3 },
              { year: '2017', stores: 106000, growth: 13 },
              { year: '2018', stores: 122000, growth: 15 },
              { year: '2019', stores: 132000, growth: 9 },
            ];

            const competitiveSalesData = [
              { year: '2017', FamilyMart: 802.58, '7-Eleven': 466.66, Lawson: 310.96 },
              { year: '2018', FamilyMart: 949.08, '7-Eleven': 584.73, Lawson: 429.10 },
              { year: '2019', FamilyMart: 1003.00, '7-Eleven': 738.82, Lawson: 596.45 },
            ];

            const competitiveStoresData = [
              { year: '2017', FamilyMart: 2181, '7-Eleven': 1699, Lawson: 1399 },
              { year: '2018', FamilyMart: 2571, '7-Eleven': 1802, Lawson: 1973 },
              { year: '2019', FamilyMart: 2801, '7-Eleven': 2147, Lawson: 2629 },
            ];

            const chinaMarketShare = [
              { name: 'Meiyijia', value: 12 },
              { name: 'FamilyMart', value: 8 },
              { name: 'Hongqi', value: 8 },
              { name: 'Lawson', value: 6 },
              { name: '7-Eleven', value: 2 },
              { name: 'Others', value: 64 },
            ];

            const japanMarketShare = [
              { name: '7-Eleven', value: 44 },
              { name: 'FamilyMart', value: 26 },
              { name: 'Lawson', value: 20 },
              { name: 'Others', value: 10 },
            ];

            // Exhibit 3: Joint Venture Ownership Structure
            const exhibit3Ownership = [
              { name: 'Ting Hsin Int. Group', value: 59.65, color: '#003882' },
              { name: 'FM China Holding (Japan/Itochu)', value: 22.05, color: '#00A54F' },
              { name: 'FamilyMart Taiwan', value: 18.30, color: '#10b981' },
            ];

            const BRAND_COLORS = { 
                'FamilyMart': '#00A54F', 
                '7-Eleven': '#f97316', 
                'Lawson': '#3b82f6',
                'Meiyijia': '#ef4444',
                'Hongqi': '#8b5cf6',
                'Others': '#9ca3af'
            };
            const allBrands = ['FamilyMart', '7-Eleven', 'Lawson', 'Meiyijia', 'Hongqi', 'Others'];

            // --- Main Application Component ---
            function App() {
              const [activeTab, setActiveTab] = useState('overview');
              const [lang, setLang] = useState('EN');

              const t = (en, th) => lang === 'EN' ? en : th;

              return (
                <div className="min-h-screen p-4 md:p-8 max-w-[1400px] mx-auto text-slate-800">
                  
                  {/* Header Section */}
                  <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                    <header>
                      <h1 className="text-3xl md:text-4xl font-black text-slate-900 flex items-center gap-3 mb-2 tracking-tight">
                        <i className="fas fa-store text-4xl text-[#00A54F]"></i>
                        {t("FamilyMart in China: Partnership Dashboard", "แดชบอร์ดวิเคราะห์ความร่วมมือ: แฟมิลี่มาร์ทในประเทศจีน")}
                      </h1>
                      <p className="text-slate-500 text-lg max-w-3xl">
                        {t("An interactive analysis of the 20-year international partnership divorce between FamilyMart Japan and Ting Hsin.", 
                           "บทวิเคราะห์เชิงโต้ตอบเจาะลึกความขัดแย้งและการยุติความร่วมมือข้ามชาติกว่า 2 ทศวรรษ ระหว่าง FamilyMart Japan และ Ting Hsin")}
                      </p>
                    </header>

                    {/* Language Switcher */}
                    <div className="flex bg-white p-1 rounded-lg border border-slate-200 items-center shrink-0 shadow-sm">
                      <button 
                        onClick={() => setLang('EN')}
                        className={`px-4 py-2 text-sm font-bold rounded-md transition-all ${lang === 'EN' ? 'bg-slate-100 text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                      >
                        <i className="fas fa-language mr-2"></i>EN
                      </button>
                      <button 
                        onClick={() => setLang('TH')}
                        className={`px-4 py-2 text-sm font-bold rounded-md transition-all ${lang === 'TH' ? 'bg-slate-100 text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                      >
                        TH
                      </button>
                    </div>
                  </div>

                  {/* KPI Cards */}
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex items-center space-x-4">
                      <div className="bg-green-50 p-4 rounded-xl text-[#00A54F]">
                        <i className="fas fa-store text-2xl"></i>
                      </div>
                      <div>
                        <p className="text-xs text-slate-500 font-semibold uppercase tracking-wider">{t("FamilyMart CN Stores (2019)", "จำนวนสาขาในจีน (2019)")}</p>
                        <h3 className="text-3xl font-black text-slate-800">2,801</h3>
                        <p className="text-xs text-green-600 font-medium mt-1">{t("#1 Foreign Brand Market Share", "ส่วนแบ่งอันดับ 1 ในกลุ่มแบรนด์ต่างชาติ")}</p>
                      </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex items-center space-x-4">
                      <div className="bg-blue-50 p-4 rounded-xl text-blue-600">
                        <i className="fas fa-yen-sign text-2xl"></i>
                      </div>
                      <div>
                        <p className="text-xs text-slate-500 font-semibold uppercase tracking-wider">{t("FamilyMart CN Sales (2019)", "ยอดขายในประเทศจีน (2019)")}</p>
                        <h3 className="text-3xl font-black text-slate-800">{t("¥1.00B", "1.00 พันล้านหยวน")}</h3>
                        <p className="text-xs text-blue-600 font-medium mt-1">{t("+5.7% YOY Growth", "เติบโต +5.7% (YOY)")}</p>
                      </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex items-center space-x-4">
                      <div className="bg-orange-50 p-4 rounded-xl text-orange-500">
                        <i className="fas fa-chart-line text-2xl"></i>
                      </div>
                      <div>
                        <p className="text-xs text-slate-500 font-semibold uppercase tracking-wider">{t("China Market Size", "ขนาดตลาดจีนโดยรวม")}</p>
                        <h3 className="text-3xl font-black text-slate-800">132,000</h3>
                        <p className="text-xs text-orange-600 font-medium mt-1">{t("Total C-Stores in 2019", "จำนวนร้านสะดวกซื้อทั้งหมดในปี 2019")}</p>
                      </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border-l-4 border-l-red-500 p-6 flex items-center space-x-4 relative overflow-hidden">
                      <div className="absolute -right-4 -bottom-4 opacity-5 text-red-500">
                        <i className="fas fa-gavel text-8xl"></i>
                      </div>
                      <div className="bg-red-50 p-4 rounded-xl text-red-600 z-10">
                        <i className="fas fa-exclamation-triangle text-2xl"></i>
                      </div>
                      <div className="z-10">
                        <p className="text-xs text-slate-500 font-semibold uppercase tracking-wider">{t("Core Dispute: Royalty Fees", "ข้อพิพาทหลัก: ค่าลิขสิทธิ์")}</p>
                        <h3 className="text-2xl font-black text-slate-800">{t("1.00% vs 0.30%", "1.00% เทียบกับ 0.30%")}</h3>
                        <p className="text-[10px] text-red-600 font-medium mt-1 leading-tight">{t("FM's demanded rate vs. Ting Hsin's desired rate.", "อัตราที่แฟมิลี่มาร์ทเรียกเก็บ เทียบกับอัตราที่ Ting Hsin ขอ")}</p>
                      </div>
                    </div>
                  </div>

                  {/* Clean 1-Row Tabs Navigation */}
                  <div className="flex flex-wrap items-center gap-2 mb-8 bg-slate-200/50 p-1.5 rounded-xl border border-slate-200">
                    <button onClick={() => setActiveTab('overview')} className={`px-4 py-2.5 text-sm font-semibold rounded-lg transition-all flex items-center ${activeTab === 'overview' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100'}`}>
                      <i className="fas fa-chart-bar mr-2 text-slate-400"></i>{t("Market Data", "ข้อมูลการตลาด")}
                    </button>
                    <button onClick={() => setActiveTab('cstore-history')} className={`px-4 py-2.5 text-sm font-semibold rounded-lg transition-all flex items-center ${activeTab === 'cstore-history' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100'}`}>
                      <i className="fas fa-history mr-2 text-slate-400"></i>{t("C-Store History", "ประวัติร้านสะดวกซื้อ")}
                    </button>
                    <button onClick={() => setActiveTab('partners')} className={`px-4 py-2.5 text-sm font-semibold rounded-lg transition-all flex items-center ${activeTab === 'partners' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100'}`}>
                      <i className="fas fa-building mr-2 text-slate-400"></i>{t("The Partners", "ข้อมูลพันธมิตร")}
                    </button>
                    <button onClick={() => setActiveTab('strategy')} className={`px-4 py-2.5 text-sm font-semibold rounded-lg transition-all flex items-center ${activeTab === 'strategy' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100'}`}>
                      <i className="fas fa-chess-knight mr-2 text-slate-400"></i>{t("Strategy Dispute", "ข้อพิพาทเชิงกลยุทธ์")}
                    </button>
                    <button onClick={() => setActiveTab('dispute')} className={`px-4 py-2.5 text-sm font-semibold rounded-lg transition-all flex items-center ${activeTab === 'dispute' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100'}`}>
                      <i className="fas fa-balance-scale mr-2 text-slate-400"></i>{t("Timeline", "ลำดับเหตุการณ์")}
                    </button>
                    <button onClick={() => setActiveTab('resolution')} className={`px-4 py-2.5 text-sm font-semibold rounded-lg transition-all flex items-center ${activeTab === 'resolution' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100'}`}>
                      <i className="fas fa-handshake mr-2 text-slate-400"></i>{t("2024 Resolution", "บทสรุปปี 2024")}
                    </button>
                    
                    <div className="flex-grow"></div> {/* Spacer */}
                    
                    <button onClick={() => setActiveTab('presentation')} className={`px-5 py-2.5 text-sm font-bold rounded-lg transition-all flex items-center border ${activeTab === 'presentation' ? 'bg-indigo-50 border-indigo-200 text-indigo-700 shadow-sm' : 'bg-white border-slate-200 text-indigo-600 hover:bg-indigo-50 shadow-sm'}`}>
                      <i className="fas fa-users mr-2"></i>{t("Presentation Guide", "แนวทางการนำเสนอ")}
                    </button>
                  </div>

                  {/* --- TAB CONTENT: MARKET DATA --- */}
                  {activeTab === 'overview' && (
                    <div className="space-y-6 animate-in fade-in duration-300">
                      
                      {/* Row 1: Line Charts */}
                      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                          <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center"><i className="fas fa-chart-line text-slate-400 mr-2"></i> {t("Foreign Brand Sales in China (¥ Millions)", "ยอดขายของแบรนด์ต่างชาติในจีน (ล้านหยวน)")}</h3>
                          <div className="h-72">
                            <ResponsiveContainer width="100%" height="100%">
                              <BarChart data={competitiveSalesData} margin={{ top: 20, right: 30, left: 0, bottom: 5 }}>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                <XAxis dataKey="year" axisLine={false} tickLine={false} />
                                <YAxis axisLine={false} tickLine={false} />
                                <Tooltip cursor={{fill: '#f8fafc'}} contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                                <Legend iconType="circle" />
                                <Bar dataKey="FamilyMart" name={t("FamilyMart", "แฟมิลี่มาร์ท")} fill={BRAND_COLORS.FamilyMart} radius={[4, 4, 0, 0]} />
                                <Bar dataKey="7-Eleven" fill={BRAND_COLORS['7-Eleven']} radius={[4, 4, 0, 0]} />
                                <Bar dataKey="Lawson" name={t("Lawson", "ลอว์สัน")} fill={BRAND_COLORS.Lawson} radius={[4, 4, 0, 0]} />
                              </BarChart>
                            </ResponsiveContainer>
                          </div>
                        </div>

                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                          <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center"><i className="fas fa-store text-slate-400 mr-2"></i> {t("Foreign Brand Store Count in China", "จำนวนสาขาของแบรนด์ต่างชาติในจีน")}</h3>
                          <div className="h-72">
                            <ResponsiveContainer width="100%" height="100%">
                              <LineChart data={competitiveStoresData} margin={{ top: 20, right: 30, left: 0, bottom: 5 }}>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                <XAxis dataKey="year" axisLine={false} tickLine={false} />
                                <YAxis axisLine={false} tickLine={false} domain={['dataMin - 200', 'dataMax + 200']} />
                                <Tooltip contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                                <Legend iconType="circle" />
                                <Line type="monotone" dataKey="FamilyMart" name={t("FamilyMart", "แฟมิลี่มาร์ท")} stroke={BRAND_COLORS.FamilyMart} strokeWidth={3} dot={{r: 4}} activeDot={{r: 6}} />
                                <Line type="monotone" dataKey="7-Eleven" stroke={BRAND_COLORS['7-Eleven']} strokeWidth={3} dot={{r: 4}} activeDot={{r: 6}} />
                                <Line type="monotone" dataKey="Lawson" name={t("Lawson", "ลอว์สัน")} stroke={BRAND_COLORS.Lawson} strokeWidth={3} dot={{r: 4}} activeDot={{r: 6}} />
                              </LineChart>
                            </ResponsiveContainer>
                          </div>
                        </div>
                      </div>

                      {/* Row 2: China Total Market & JV Ownership */}
                      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        
                        {/* China Total Market Growth */}
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                          <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center"><i className="fas fa-chart-area text-slate-400 mr-2"></i> {t("Total C-Stores in China", "ภาพรวมจำนวนร้านสะดวกซื้อในจีน")}</h3>
                          <div className="h-72">
                            <ResponsiveContainer width="100%" height="100%">
                              <ComposedChart data={marketGrowthData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                <XAxis dataKey="year" axisLine={false} tickLine={false} fontSize={12} />
                                <YAxis yAxisId="left" axisLine={false} tickLine={false} fontSize={12} />
                                <YAxis yAxisId="right" orientation="right" axisLine={false} tickLine={false} fontSize={12} domain={[0, 20]} />
                                <Tooltip contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                                <Legend />
                                <Area yAxisId="left" type="monotone" dataKey="stores" name={t("Total Stores", "จำนวนสาขารวม")} stroke="#8b5cf6" fill="#c4b5fd" fillOpacity={0.4} strokeWidth={2} />
                                <Line yAxisId="right" type="monotone" dataKey="growth" name={t("Growth Rate (%)", "อัตราการเติบโต (%)")} stroke="#f59e0b" strokeWidth={3} dot={{r: 4}} />
                              </ComposedChart>
                            </ResponsiveContainer>
                          </div>
                        </div>

                        {/* Exhibit 3 JV Ownership */}
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                            <div className="flex justify-between items-start mb-4">
                                <div>
                                    <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                        <i className="fas fa-project-diagram text-indigo-500"></i>
                                        {t("Exhibit 3: JV Ownership (China CVS Holding)", "เอกสารอ้างอิง 3: โครงสร้างผู้ถือหุ้นบริษัทร่วมทุน")}
                                    </h3>
                                    <p className="text-xs text-slate-500 mt-1">{t("Ting Hsin held the majority voting rights, giving them local operational control.", "Ting Hsin ถือหุ้นใหญ่ ซึ่งให้สิทธิ์ขาดในการควบคุมการดำเนินงานท้องถิ่น")}</p>
                                </div>
                            </div>
                            <div className="flex flex-col md:flex-row items-center justify-center h-64 gap-6">
                                <div className="w-full md:w-1/2 h-full">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <PieChart>
                                            <Pie data={exhibit3Ownership} cx="50%" cy="50%" innerRadius={50} outerRadius={80} paddingAngle={2} dataKey="value">
                                                {exhibit3Ownership.map((entry, index) => (
                                                    <Cell key={`cell-${index}`} fill={entry.color} />
                                                ))}
                                            </Pie>
                                            <Tooltip formatter={(value) => `${value}%`} contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                                        </PieChart>
                                    </ResponsiveContainer>
                                </div>
                                <div className="w-full md:w-1/2 space-y-3">
                                    {exhibit3Ownership.map((item) => (
                                        <div key={item.name} className="flex flex-col">
                                            <div className="flex items-center gap-2 mb-1">
                                                <div className="w-3 h-3 rounded-sm" style={{ backgroundColor: item.color }}></div>
                                                <span className="text-sm font-semibold text-slate-700">{item.value}%</span>
                                            </div>
                                            <span className="text-xs text-slate-500 pl-5">{item.name}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                      </div>
                      
                      {/* Row 3: Market Share Pies */}
                      <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                          <h3 className="text-lg font-bold text-slate-800 mb-6 text-center">{t("2019 Market Share: China vs Japan", "ส่วนแบ่งการตลาดปี 2019: ประเทศจีน เทียบกับ ประเทศญี่ปุ่น")}</h3>
                          <div className="flex flex-col md:flex-row h-64 items-center justify-around mb-4">
                            <div className="w-full md:w-1/2 h-full flex flex-col items-center">
                              <span className="text-sm font-semibold text-slate-500 mb-2">{t("China Market (Fragmented)", "ตลาดจีน (ผู้เล่นกระจายตัว)")}</span>
                              <ResponsiveContainer width="100%" height="100%">
                                <PieChart>
                                  <Pie data={chinaMarketShare} cx="50%" cy="50%" innerRadius={40} outerRadius={80} paddingAngle={2} dataKey="value">
                                    {chinaMarketShare.map((entry, index) => (
                                      <Cell key={`cell-${index}`} fill={BRAND_COLORS[entry.name] || '#9ca3af'} />
                                    ))}
                                  </Pie>
                                  <Tooltip formatter={(value) => `${value}%`} contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                                </PieChart>
                              </ResponsiveContainer>
                            </div>
                            <div className="w-full md:w-1/2 h-full flex flex-col items-center">
