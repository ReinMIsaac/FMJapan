<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyMart in China: Partnership Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & Dependencies (Stable Versions) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script crossorigin src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .loading-screen { display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; color: #475569; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-screen">
            <i class="fas fa-circle-notch fa-spin text-4xl mb-4 text-[#00A54F]"></i>
            <h2 class="text-xl font-bold">Loading Dashboard...</h2>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Interactive Cities Data
        const initialInteractiveCities = [
            { id: 'beijing', name: 'Beijing', tier: 'Tier 1', pop: '21.54 Million', gdp: '¥3.5 Trillion', top: '41%', left: '74%', theme: 'tier1' },
            { id: 'shanghai', name: 'Shanghai', tier: 'Tier 1 Hub', pop: '24.28 Million', gdp: '¥3.8 Trillion', top: '65%', left: '84%', theme: 'tier1' },
            { id: 'guangzhou', name: 'Guangzhou', tier: 'Tier 1', pop: '15.31 Million', gdp: '¥2.4 Trillion', top: '87%', left: '70%', theme: 'tier1' },
            { id: 'shenzhen', name: 'Shenzhen', tier: 'Tier 1', pop: '13.44 Million', gdp: '¥2.7 Trillion', top: '89%', left: '72%', theme: 'tier1' },
            { id: 'chengdu', name: 'Chengdu', tier: 'New Tier 1', pop: '16.58 Million', gdp: '¥1.7 Trillion', top: '67%', left: '52%', theme: 'newTier1' },
            { id: 'wuhan', name: 'Wuhan', tier: 'New Tier 1', pop: '11.21 Million', gdp: '¥1.6 Trillion', top: '65%', left: '71%', theme: 'newTier1' },
            { id: 'hangzhou', name: 'Hangzhou', tier: 'New Tier 1', pop: '10.36 Million', gdp: '¥1.5 Trillion', top: '66%', left: '81%', theme: 'newTier1' },
            { id: 'zhengzhou', name: 'Zhengzhou', tier: 'New Tier 1', pop: '10.35 Million', gdp: '¥1.1 Trillion', top: '51%', left: '71%', theme: 'newTier1' },
            { id: 'nanjing', name: 'Nanjing', tier: 'New Tier 1', pop: '8.50 Million', gdp: '¥1.4 Trillion', top: '60%', left: '76%', theme: 'newTier1' },
            { id: 'chongqing', name: 'Chongqing', tier: 'New Tier 1', pop: '31.24 Million', gdp: '¥2.3 Trillion', top: '70%', left: '57%', theme: 'newTier1' },
            { id: 'wuxi', name: 'Wuxi', tier: 'Tier 2', pop: '6.59 Million', gdp: '¥1.2 Trillion', top: '65%', left: '78%', theme: 'tier2' },
            { id: 'foshan', name: 'Foshan', tier: 'Tier 2', pop: '8.16 Million', gdp: '¥1.1 Trillion', top: '87%', left: '67%', theme: 'tier2' },
            { id: 'fuzhou', name: 'Fuzhou', tier: 'Tier 2', pop: '8.29 Million', gdp: '¥0.9 Trillion', top: '80%', left: '80%', theme: 'tier2' },
            { id: 'harbin', name: 'Harbin', tier: 'Tier 2', pop: '10.76 Million', gdp: '¥0.52 Trillion', top: '29%', left: '89%', theme: 'tier2' },
            { id: 'hohhot', name: 'Hohhot', tier: 'Tier 3', pop: '3.12 Million', gdp: '¥0.28 Trillion', top: '40%', left: '66%', theme: 'tier3' },
            { id: 'lanzhou', name: 'Lanzhou', tier: 'Tier 2', pop: '3.79 Million', gdp: '¥0.28 Trillion', top: '51%', left: '53%', theme: 'tier2' },
            { id: 'yantai', name: 'Yantai', tier: 'Tier 2', pop: '7.13 Million', gdp: '¥0.76 Trillion', top: '48%', left: '81%', theme: 'tier2' },
            { id: 'changsha', name: 'Changsha', tier: 'New Tier 1', pop: '8.39 Million', gdp: '¥1.15 Trillion', top: '73%', left: '69%', theme: 'newTier1' },
            { id: 'nanning', name: 'Nanning', tier: 'Tier 2', pop: '7.25 Million', gdp: '¥0.45 Trillion', top: '87%', left: '60%', theme: 'tier2' },
            { id: 'quanzhou', name: 'Quanzhou', tier: 'Tier 2', pop: '8.74 Million', gdp: '¥0.99 Trillion', top: '84%', left: '77%', theme: 'tier2' }
        ];

        function App() {
            // ALL Hooks must be called before any early returns
            const [activeTab, setActiveTab] = useState('overview');
            const [ready, setReady] = useState(false);
            const [hoveredCity, setHoveredCity] = useState(null);
            
            // Drag state
            const [draggingCityId, setDraggingCityId] = useState(null);
            const [interactiveCities, setInteractiveCities] = useState(initialInteractiveCities);
            const mapRef = useRef(null);

            // Safety check for Recharts initialization
            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.Recharts) {
                        setReady(true);
                        clearInterval(interval);
                    }
                }, 100);
                return () => clearInterval(interval);
            }, []);

            // Early return AFTER all hooks
            if (!ready) return null;

            const { 
              BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
              PieChart, Pie, Cell, AreaChart, Area, ComposedChart
            } = window.Recharts;

            // --- Data ---
            const marketGrowthData = [
              { year: '2016', stores: 94000, growth: 3 },
              { year: '2017', stores: 106000, growth: 13 },
              { year: '2018', stores: 122000, growth: 15 },
              { year: '2019', stores: 132000, growth: 9 },
            ];

            const competitiveSalesData = [
              { year: '2017', FamilyMart: 802.58, '7-Eleven': 466.66, Lawson: 310.96 },
              { year: '2018', FamilyMart: 949.08, '7-Eleven': 584.73, Lawson: 429.10 },
              { year: '2019', FamilyMart: 1003.00, '7-Eleven': 738.82, Lawson: 596.45 },
            ];

            const competitiveStoresData = [
              { year: '2017', FamilyMart: 2181, '7-Eleven': 1699, Lawson: 1399 },
              { year: '2018', FamilyMart: 2571, '7-Eleven': 1802, Lawson: 1973 },
              { year: '2019', FamilyMart: 2801, '7-Eleven': 2147, Lawson: 2629 },
            ];

            const chinaMarketShare = [
              { name: 'Meiyijia', value: 12 },
              { name: 'FamilyMart', value: 8 },
              { name: 'Hongqi', value: 8 },
              { name: 'Lawson', value: 6 },
              { name: '7-Eleven', value: 2 },
              { name: 'Others', value: 64 },
            ];

            const japanMarketShare = [
              { name: '7-Eleven', value: 44 },
              { name: 'FamilyMart', value: 26 },
              { name: 'Lawson', value: 20 },
              { name: 'Others', value: 10 },
            ];

            const exhibit3Ownership = [
              { name: 'Ting Hsin Int. Group', value: 59.65, color: '#003882' },
              { name: 'FM China Holding (Japan/Itochu)', value: 22.05, color: '#00A54F' },
              { name: 'FamilyMart Taiwan', value: 18.30, color: '#10b981' },
            ];

            const BRAND_COLORS = { 
                'FamilyMart': '#00A54F', 
                '7-Eleven': '#f97316', 
                'Lawson': '#3b82f6',
                'Meiyijia': '#ef4444',
                'Hongqi': '#8b5cf6',
                'Others': '#9ca3af'
            };

            const allBrands = ['FamilyMart', '7-Eleven', 'Lawson', 'Meiyijia', 'Hongqi', 'Others'];

            const handleDragStart = (e, id) => {
                e.preventDefault();
                setDraggingCityId(id);
                setHoveredCity(null); 
            };

            const handleDragMove = (e) => {
                if (!draggingCityId || !mapRef.current) return;
                const rect = mapRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                let x = clientX - rect.left;
                let y = clientY - rect.top;

                // Clamp values to keep pins inside the map bounds
                x = Math.max(0, Math.min(x, rect.width));
                y = Math.max(0, Math.min(y, rect.height));

                const left = (x / rect.width * 100).toFixed(0) + '%';
                const top = (y / rect.height * 100).toFixed(0) + '%';

                setInteractiveCities(prev => prev.map(city => 
                    city.id === draggingCityId ? { ...city, left, top } : city
                ));
            };

            const handleDragEnd = () => {
                setDraggingCityId(null);
            };

            const themeClasses = {
                tier1: { bg: 'bg-[#1ba13b]', text: 'text-[#1ba13b]', badgeText: 'text-white' },
                newTier1: { bg: 'bg-[#b9e623]', text: 'text-[#96be11]', badgeText: 'text-slate-800' }, 
                tier2: { bg: 'bg-[#ffde00]', text: 'text-[#ffde00]', badgeText: 'text-slate-800' }, 
                tier3: { bg: 'bg-[#ffb400]', text: 'text-[#ffb400]', badgeText: 'text-white' }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-[1400px] mx-auto text-slate-800">
                  
                  {/* Header */}
                  <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                    <header>
                      <h1 className="text-3xl md:text-4xl font-black text-slate-900 flex items-center gap-3 mb-2 tracking-tight">
                        <i className="fas fa-store text-[#00A54F]"></i>
                        FamilyMart in China: Partnership Dashboard
                      </h1>
                      <p className="text-slate-500 text-lg max-w-3xl">
                        An interactive analysis of the 20-year international partnership divorce between FamilyMart Japan and Ting Hsin.
                      </p>
                    </header>
                  </div>

                  {/* KPI Cards */}
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex items-center space-x-4">
                      <div className="bg-green-50 p-4 rounded-xl text-[#00A54F]">
                        <i className="fas fa-store text-2xl"></i>
                      </div>
                      <div>
                        <p className="text-xs text-slate-500 font-semibold uppercase tracking-wider">FamilyMart CN Stores (2019)</p>
                        <h3 className="text-3xl font-black text-slate-800">2,801</h3>
                        <p className="text-xs text-green-600 font-medium mt-1">#1 Foreign Brand Market Share</p>
                      </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex items-center space-x-4">
                      <div className="bg-blue-50 p-4 rounded-xl text-blue-600">
                        <i className="fas fa-yen-sign text-2xl"></i>
                      </div>
                      <div>
                        <p className="text-xs text-slate-500 font-semibold uppercase tracking-wider">FamilyMart CN Sales (2019)</p>
                        <h3 className="text-3xl font-black text-slate-800">¥1.00B</h3>
                        <p className="text-xs text-blue-600 font-medium mt-1">+5.7% YOY Growth</p>
                      </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex items-center space-x-4">
                      <div className="bg-orange-50 p-4 rounded-xl text-orange-500">
                        <i className="fas fa-chart-line text-2xl"></i>
                      </div>
                      <div>
                        <p className="text-xs text-slate-500 font-semibold uppercase tracking-wider">China Market Size</p>
                        <h3 className="text-3xl font-black text-slate-800">132,000</h3>
                        <p className="text-xs text-orange-600 font-medium mt-1">Total C-Stores in 2019</p>
                      </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border-l-4 border-l-red-500 p-6 flex items-center space-x-4 relative overflow-hidden">
                      <div className="absolute -right-4 -bottom-4 opacity-5 text-red-500">
                        <i className="fas fa-gavel text-8xl"></i>
                      </div>
                      <div className="bg-red-50 p-4 rounded-xl text-red-600 z-10">
                        <i className="fas fa-exclamation-triangle text-2xl"></i>
                      </div>
                      <div className="z-10">
                        <p className="text-xs text-slate-500 font-semibold uppercase tracking-wider">Core Dispute: Royalty Fees</p>
                        <h3 className="text-2xl font-black text-slate-800">1.00% vs 0.30%</h3>
                        <p className="text-[10px] text-red-600 font-medium mt-1 leading-tight">FM's demanded rate vs. Ting Hsin's desired rate.</p>
                      </div>
                    </div>
                  </div>

                  {/* Clean Tabs Navigation */}
                  <div className="flex flex-wrap items-center gap-2 mb-8 bg-slate-200/50 p-1.5 rounded-xl border border-slate-200">
                    <button onClick={() => setActiveTab('overview')} className={`px-4 py-2.5 text-sm font-semibold rounded-lg transition-all flex items-center ${activeTab === 'overview' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100'}`}>
                      <i className="fas fa-chart-bar mr-2 text-slate-400"></i>Market Data
                    </button>
                    <button onClick={() => setActiveTab('partners')} className={`px-4 py-2.5 text-sm font-semibold rounded-lg transition-all flex items-center ${activeTab === 'partners' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100'}`}>
                      <i className="fas fa-users mr-2 text-slate-400"></i>The Partners
                    </button>
                    <button onClick={() => setActiveTab('strategy')} className={`px-4 py-2.5 text-sm font-semibold rounded-lg transition-all flex items-center ${activeTab === 'strategy' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100'}`}>
                      <i className="fas fa-chess-knight mr-2 text-slate-400"></i>Strategy Dispute
                    </button>
                    <button onClick={() => setActiveTab('legal')} className={`px-4 py-2.5 text-sm font-semibold rounded-lg transition-all flex items-center ${activeTab === 'legal' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100'}`}>
                      <i className="fas fa-gavel mr-2 text-slate-400"></i>Legal Battle
                    </button>
                    <button onClick={() => setActiveTab('negotiation')} className={`px-4 py-2.5 text-sm font-semibold rounded-lg transition-all flex items-center ${activeTab === 'negotiation' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100'}`}>
                      <i className="fas fa-handshake-angle mr-2 text-slate-400"></i>Negotiation (BATNA)
                    </button>
                    <button onClick={() => setActiveTab('dispute')} className={`px-4 py-2.5 text-sm font-semibold rounded-lg transition-all flex items-center ${activeTab === 'dispute' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100'}`}>
                      <i className="fas fa-stream mr-2 text-slate-400"></i>Timeline
                    </button>
                    <button onClick={() => setActiveTab('resolution')} className={`px-4 py-2.5 text-sm font-semibold rounded-lg transition-all flex items-center ${activeTab === 'resolution' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100'}`}>
                      <i className="fas fa-file-signature mr-2 text-slate-400"></i>2024 Resolution
                    </button>
                  </div>

                  {/* --- TAB CONTENT: MARKET DATA --- */}
                  {activeTab === 'overview' && (
                    <div className="space-y-6 animate-in fade-in duration-300">
                      
                      {/* Row 1: Line Charts */}
                      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                          <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center"><i className="fas fa-chart-line text-slate-400 mr-2"></i> Foreign Brand Sales in China (¥ Millions)</h3>
                          <div className="h-72">
                            <ResponsiveContainer width="100%" height="100%">
                              <BarChart data={competitiveSalesData} margin={{ top: 20, right: 30, left: 0, bottom: 5 }}>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                <XAxis dataKey="year" axisLine={false} tickLine={false} />
                                <YAxis axisLine={false} tickLine={false} />
                                <Tooltip cursor={{fill: '#f8fafc'}} contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                                <Legend iconType="circle" />
                                <Bar dataKey="FamilyMart" name="FamilyMart" fill={BRAND_COLORS.FamilyMart} radius={[4, 4, 0, 0]} />
                                <Bar dataKey="7-Eleven" fill={BRAND_COLORS['7-Eleven']} radius={[4, 4, 0, 0]} />
                                <Bar dataKey="Lawson" name="Lawson" fill={BRAND_COLORS.Lawson} radius={[4, 4, 0, 0]} />
                              </BarChart>
                            </ResponsiveContainer>
                          </div>
                        </div>

                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                          <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center"><i className="fas fa-store text-slate-400 mr-2"></i> Foreign Brand Store Count in China</h3>
                          <div className="h-72">
                            <ResponsiveContainer width="100%" height="100%">
                              <LineChart data={competitiveStoresData} margin={{ top: 20, right: 30, left: 0, bottom: 5 }}>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                <XAxis dataKey="year" axisLine={false} tickLine={false} />
                                <YAxis axisLine={false} tickLine={false} domain={['dataMin - 200', 'dataMax + 200']} />
                                <Tooltip contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                                <Legend iconType="circle" />
                                <Line type="monotone" dataKey="FamilyMart" name="FamilyMart" stroke={BRAND_COLORS.FamilyMart} strokeWidth={3} dot={{r: 4}} activeDot={{r: 6}} />
                                <Line type="monotone" dataKey="7-Eleven" stroke={BRAND_COLORS['7-Eleven']} strokeWidth={3} dot={{r: 4}} activeDot={{r: 6}} />
                                <Line type="monotone" dataKey="Lawson" name="Lawson" stroke={BRAND_COLORS.Lawson} strokeWidth={3} dot={{r: 4}} activeDot={{r: 6}} />
                              </LineChart>
                            </ResponsiveContainer>
                          </div>
                        </div>
                      </div>

                      {/* Row 2: China Total Market & JV Ownership */}
                      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        
                        {/* China Total Market Growth */}
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                          <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center"><i className="fas fa-chart-area text-slate-400 mr-2"></i> Total C-Stores in China</h3>
                          <div className="h-72">
                            <ResponsiveContainer width="100%" height="100%">
                              <ComposedChart data={marketGrowthData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                <XAxis dataKey="year" axisLine={false} tickLine={false} fontSize={12} />
                                <YAxis yAxisId="left" axisLine={false} tickLine={false} fontSize={12} />
                                <YAxis yAxisId="right" orientation="right" axisLine={false} tickLine={false} fontSize={12} domain={[0, 20]} />
                                <Tooltip contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                                <Legend />
                                <Area yAxisId="left" type="monotone" dataKey="stores" name="Total Stores" stroke="#8b5cf6" fill="#c4b5fd" fillOpacity={0.4} strokeWidth={2} />
                                <Line yAxisId="right" type="monotone" dataKey="growth" name="Growth Rate (%)" stroke="#f59e0b" strokeWidth={3} dot={{r: 4}} />
                              </ComposedChart>
                            </ResponsiveContainer>
                          </div>
                        </div>

                        {/* Exhibit 3 JV Ownership */}
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                            <div className="flex justify-between items-start mb-4">
                                <div>
                                    <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                        <i className="fas fa-project-diagram text-indigo-500"></i>
                                        Exhibit 3: JV Ownership (China CVS Holding)
                                    </h3>
                                    <p className="text-xs text-slate-500 mt-1">Ting Hsin held the majority voting rights, giving them local operational control.</p>
                                </div>
                            </div>
                            <div className="flex flex-col md:flex-row items-center justify-center h-64 gap-6">
                                <div className="w-full md:w-1/2 h-full">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <PieChart>
                                            <Pie data={exhibit3Ownership} cx="50%" cy="50%" innerRadius={50} outerRadius={80} paddingAngle={2} dataKey="value">
                                                {exhibit3Ownership.map((entry, index) => (
                                                    <Cell key={`cell-${index}`} fill={entry.color} />
                                                ))}
                                            </Pie>
                                            <Tooltip formatter={(value) => `${value}%`} contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                                        </PieChart>
                                    </ResponsiveContainer>
                                </div>
                                <div className="w-full md:w-1/2 space-y-3">
                                    {exhibit3Ownership.map((item) => (
                                        <div key={item.name} className="flex flex-col">
                                            <div className="flex items-center gap-2 mb-1">
                                                <div className="w-3 h-3 rounded-sm" style={{ backgroundColor: item.color }}></div>
                                                <span className="text-sm font-semibold text-slate-700">{item.value}%</span>
                                            </div>
                                            <span className="text-xs text-slate-500 pl-5">{item.name}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                      </div>
                      
                      {/* Row 3: Market Share Pies */}
                      <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                          <h3 className="text-lg font-bold text-slate-800 mb-6 text-center">2019 Market Share: China vs Japan</h3>
                          <div className="flex flex-col md:flex-row h-64 items-center justify-around mb-4">
                            <div className="w-full md:w-1/2 h-full flex flex-col items-center">
                              <span className="text-sm font-semibold text-slate-500 mb-2">China Market (Fragmented)</span>
                              <ResponsiveContainer width="100%" height="100%">
                                <PieChart>

                            <p className="text-slate-400 text-sm font-mono mb-6">[2023] UKPC 33</p>

                                In a landmark judgement on appeal from the Court of Appeal of the Cayman Islands, the Privy Council delivered a crucial ruling that altered the course of the dispute:
                            </p>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-slate-700/50 p-5 rounded-lg border border-slate-600">
                                    <h5 className="font-bold text-yellow-400 mb-2">1. The "Trial of Facts"</h5>
                                    <p className="text-sm text-slate-300">The court ruled that the factual disputes (such as whether Ting Hsin was actually hiding money or diverting profits) must first be investigated and decided in private arbitration.</p>
                                </div>
                                <div className="bg-slate-700/50 p-5 rounded-lg border border-slate-600">
                                    <h5 className="font-bold text-yellow-400 mb-2">2. The Court's Role</h5>
                                    <p className="text-sm text-slate-300">While only a court has the ultimate power to legally dissolve (wind up) a company, it will not do so until an arbitrator confirms a breach of trust occurred. If confirmed, FMJ could then return to court for a final remedy like a forced buy-out.</p>
                                </div>
                            </div>
                            <div className="mt-6 p-4 bg-yellow-500/10 border border-yellow-500/30 rounded-lg text-yellow-200 text-sm font-medium text-center">
                                Result: This ruling stalled FamilyMart's attempt for a quick legal dissolution and forced both parties into a prolonged, private arbitration process—eventually paving the way for their out-of-court settlement in 2024.
                            </div>
                        </div>
                    </div>
                  )}

                  {/* --- TAB CONTENT: NEGOTIATION (BATNA) --- */}
                  {activeTab === 'negotiation' && (
                    <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm border border-slate-100 animate-in fade-in duration-300">
                        {/* BATNA Explanation */}
                        <div className="mb-10 pb-8 border-b border-slate-100">
                            <h3 className="text-3xl font-black text-slate-800 mb-4 flex items-center gap-3">
                                <i className="fas fa-handshake-angle text-indigo-500"></i>
                                What is BATNA?
                            </h3>
                            <div className="bg-slate-50 p-6 rounded-xl border border-slate-200">
                                <p className="text-slate-700 leading-relaxed mb-6 text-lg">
                                    <strong>BATNA</strong> = <span className="text-indigo-600 font-bold">B</span>est <span className="text-indigo-600 font-bold">A</span>lternative <span className="text-indigo-600 font-bold">T</span>o a <span className="text-indigo-600 font-bold">N</span>egotiated <span className="text-indigo-600 font-bold">A</span>greement (Roger Fisher). <br/>
                                    <span className="text-sm mt-2 block">It represents the most advantageous course of action a party can take if negotiations fail and an agreement cannot be reached (essentially, your "Plan B").</span>
                                </p>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 text-sm">
                                    <div className="bg-white p-5 rounded-lg border border-slate-200 shadow-sm flex items-start gap-4">
                                        <div className="bg-green-100 p-3 rounded-full text-green-600 shrink-0"><i className="fas fa-shield-alt text-xl"></i></div>
                                        <div>
                                            <h4 className="font-bold text-slate-800 mb-1 text-base">Prevents Bad Deals</h4>
                                            <p className="text-slate-600 leading-relaxed">It provides a strict rejection point. If the current offer on the table is worse than your BATNA, you should walk away.</p>
                                        </div>
                                    </div>
                                    <div className="bg-white p-5 rounded-lg border border-slate-200 shadow-sm flex items-start gap-4">
                                        <div className="bg-orange-100 p-3 rounded-full text-orange-600 shrink-0"><i className="fas fa-eye text-xl"></i></div>
                                        <div>
                                            <h4 className="font-bold text-slate-800 mb-1 text-base">Avoids Over-Optimism</h4>
                                            <p className="text-slate-600 leading-relaxed">It forces negotiators to look at the harsh reality of what actually happens if the deal completely falls through.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* BATNA Analysis Grids */}
                        <div>
                            <h3 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-3">
                                <i className="fas fa-balance-scale-left text-slate-400"></i>
                                Analyzing the Partners' BATNAs (2019)
                            </h3>
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                {/* FMJ BATNA */}
                                <div className="bg-green-50 rounded-xl p-6 md:p-8 border border-green-200 shadow-sm">
                                    <h4 className="text-xl font-black text-green-800 mb-6 flex items-center gap-2"><i className="fas fa-store"></i> FamilyMart's Alternatives</h4>
                                    <div className="space-y-4">
                                        <div className="bg-white p-5 rounded-lg shadow-sm border border-green-100 hover:shadow-md transition-shadow">
                                            <div className="flex justify-between items-start mb-3">
                                                <h5 className="font-bold text-slate-800 text-lg">1. Legal Battle (Force Buyout)</h5>
                                                <span className="text-[10px] font-bold bg-red-100 text-red-700 px-2 py-1 rounded uppercase tracking-wider whitespace-nowrap">High Risk / Tedious</span>
                                            </div>
                                            <p className="text-sm text-slate-600 leading-relaxed">Continue Cayman Islands lawsuit aiming for court-ordered winding-up to force Ting Hsin to sell its 59.65% stake.</p>
                                        </div>
                                        <div className="bg-white p-5 rounded-lg shadow-sm border border-green-100 hover:shadow-md transition-shadow">
                                            <div className="flex justify-between items-start mb-3">
                                                <h5 className="font-bold text-slate-800 text-lg">2. Brand Landlord (Sell to Ting Hsin)</h5>
                                                <span className="text-[10px] font-bold bg-green-100 text-green-700 px-2 py-1 rounded uppercase tracking-wider whitespace-nowrap">Low Risk / Short</span>
                                            </div>
                                            <p className="text-sm text-slate-600 leading-relaxed">Sell 40.35% stake (possibly at discount). Retain IP rights and generate revenue solely from brand licensing.</p>
                                        </div>
                                    </div>
                                </div>
                                {/* Ting Hsin BATNA */}
                                <div className="bg-blue-50 rounded-xl p-6 md:p-8 border border-blue-200 shadow-sm">

                                    <div className="space-y-4">
                                        <div className="bg-white p-5 rounded-lg shadow-sm border border-blue-100 hover:shadow-md transition-shadow">

                                                <h5 className="font-bold text-slate-800 text-lg">1. Weathering the Storm (Waiting Game)</h5>
                                                <span className="text-[10px] font-bold bg-green-100 text-green-700 px-2 py-1 rounded uppercase tracking-wider whitespace-nowrap">Low Risk / Tedious</span>
                                            </div>
                                            <p className="text-sm text-slate-600 leading-relaxed">FMJ bleeds legal fees while Ting Hsin keeps JV revenue. Time is an ally. Use attrition to force a favorable settlement.</p>
                                        </div>
                                        <div className="bg-white p-5 rounded-lg shadow-sm border border-blue-100 hover:shadow-md transition-shadow">
                                            <div className="flex justify-between items-start mb-3">
                                                <h5 className="font-bold text-slate-800 text-lg">2. The "Cash-Out" (Sell to FMJ)</h5>
                                                <span className="text-[10px] font-bold bg-red-100 text-red-700 px-2 py-1 rounded uppercase tracking-wider whitespace-nowrap">High Risk / Long</span>
                                            </div>
                                            <p className="text-sm text-slate-600 leading-relaxed">Sell 59.65% stake at a massive premium. Use cash to launch a new 100% owned franchise network with 0% royalty.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                  )}

                  {/* --- TAB CONTENT: TIMELINE --- */}
                  {activeTab === 'dispute' && (
                    <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-100 animate-in fade-in duration-300">
                        <h3 className="text-2xl font-bold text-slate-800 mb-8 flex items-center gap-3">
                          <i className="fas fa-stream text-indigo-500"></i>
                          The Dispute Timeline
                        </h3>
                        <div className="relative border-l-2 border-slate-200 ml-4 space-y-8">

                              <div className="absolute w-4 h-4 bg-slate-400 rounded-full -left-[9px] top-1 border-2 border-white"></div>
                              <p className="text-sm text-slate-500 font-bold mb-1">Oct 2018</p>
                              <h4 className="text-lg font-bold text-slate-800">FamilyMart Sues in Cayman Islands</h4>
                              <p className="text-sm text-slate-600 mt-1">Requests compulsory dissolution of the JV due to unpaid royalties and hidden financial data.</p>
                            </div>
                            <div className="relative pl-6">
                              <div className="absolute w-4 h-4 bg-slate-400 rounded-full -left-[9px] top-1 border-2 border-white"></div>

                              <h4 className="text-lg font-bold text-slate-800">Arbitration Ordered</h4>
                              <p className="text-sm text-slate-600 mt-1">Court suspends hearing, ordering dispute to go through arbitration per JV agreement.</p>
                            </div>
                            <div className="relative pl-6">
                              <div className="absolute w-4 h-4 bg-slate-400 rounded-full -left-[9px] top-1 border-2 border-white"></div>
                              <p className="text-sm text-slate-500 font-bold mb-1">Mar 2019</p>
                              <h4 className="text-lg font-bold text-slate-800">FamilyMart Appeals</h4>
                              <p className="text-sm text-slate-600 mt-1">Refusing to accept the arbitration mandate, FamilyMart Japan appeals the court's decision, insisting on direct legal dissolution.</p>
                            </div>
                            <div className="relative pl-6">
                              <div className="absolute w-4 h-4 bg-red-500 rounded-full -left-[9px] top-1 border-2 border-white shadow-[0_0_0_2px_rgba(239,68,68,0.2)]"></div>

                            </div>
                            <div className="relative pl-6">
                              <div className="absolute w-4 h-4 bg-slate-400 rounded-full -left-[9px] top-1 border-2 border-white"></div>

                              <p className="text-sm text-slate-600 mt-1">Ruling [2023] UKPC 33 affirms factual disputes (e.g., FMJ's claims of Ting Hsin hiding profits in affiliate businesses) must be arbitrated first before any court-ordered dissolution.</p>
                            </div>
                            <div className="relative pl-6">
                              <div className="absolute w-4 h-4 bg-[#00A54F] rounded-full -left-[9px] top-1 border-2 border-white"></div>
                              <p className="text-sm text-green-600 font-bold mb-1">Mar 2024</p>

                            </div>
                        </div>
                    </div>
                  )}

                  {/* --- TAB CONTENT: RESOLUTION --- */}
                  {activeTab === 'resolution' && (
                    <div className="bg-white p-8 md:p-12 rounded-xl shadow-sm border border-slate-100 animate-in fade-in duration-300">
                        <div className="max-w-3xl mx-auto text-center mb-10">
                            <div className="inline-block bg-blue-50 p-4 rounded-full mb-4 text-blue-500 text-4xl"><i className="fas fa-handshake"></i></div>
                            <h3 className="text-3xl font-black text-slate-800 mb-4">The 2024 Resolution</h3>
                            <p className="text-slate-600 text-lg">After years of costly legal battles, the partners reached a pragmatic out-of-court settlement, successfully restructuring the alliance to save the brand.</p>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                            <div className="bg-slate-50 border border-slate-200 p-8 rounded-xl border-t-4 border-t-[#003882]">
                                <h4 className="text-xl font-bold text-[#003882] mb-4 flex items-center gap-2"><i className="fas fa-building"></i> Ting Hsin's Ownership</h4>
                                <ul className="space-y-3 text-sm text-slate-700">
                                    <li className="flex items-start"><i className="fas fa-check text-blue-500 mt-1 mr-2 shrink-0"></i> Retains an 80% majority stake in the lucrative Yangtze River Delta (YRC / East China) operations.</li>
                                    <li className="flex items-start"><i className="fas fa-check text-blue-500 mt-1 mr-2 shrink-0"></i> Takes 100% full ownership of all FamilyMart operations in other parts of China (South, North, Southwest).</li>
                                </ul>
                            </div>
                            <div className="bg-slate-50 border border-slate-200 p-8 rounded-xl border-t-4 border-t-[#00A54F]">
                                <h4 className="text-xl font-bold text-[#00A54F] mb-4 flex items-center gap-2"><i className="fas fa-money-bill-wave"></i> FamilyMart Japan's Settlement</h4>
                                <ul className="space-y-3 text-sm text-slate-700">
                                    <li className="flex items-start"><i className="fas fa-check text-green-500 mt-1 mr-2 shrink-0"></i> Retains a 20% minority stake exclusively in the Yangtze River Delta (YRC) joint venture.</li>
                                    <li className="flex items-start"><i className="fas fa-check text-green-500 mt-1 mr-2 shrink-0"></i> Receives a massive buyout payment of approximately $210 million USD (31.6 billion yen) for relinquishing the rest of the China business.</li>
                                </ul>
                            </div>
                        </div>

                        <div className="bg-orange-50 border border-orange-200 p-6 rounded-xl text-center mb-10 shadow-sm">
                            <h4 className="text-xl font-black text-orange-900 mb-3 flex items-center justify-center gap-2"><i className="fas fa-lemon text-orange-500"></i> A Bittersweet Ending (JV in Name Only)</h4>
                            <p className="text-sm text-orange-800 leading-relaxed max-w-4xl mx-auto">
                                Ting Hsin undeniably won the 'Race to Learn'. They secured full control over the vast inland expansion and maintained an 80% dominant grip on East China. While FamilyMart Japan successfully exited a broken, deadlocked partnership with a lucrative $210M cash injection, their remaining 20% foothold leaves them with effectively zero operational control. The surviving entity is a Joint Venture in name only.
                            </p>
                        </div>

                        {/* Key Takeaways from the Case */}
                        <div className="border-t border-slate-200 pt-10">
                            <h3 className="text-2xl font-black text-slate-800 mb-8 flex items-center justify-center gap-3 tracking-tight">
                                <i className="fas fa-lightbulb text-yellow-500"></i>
                                Key Takeaways for Global Partnerships
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                                    <div className="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mb-5 text-xl border border-indigo-100"><i className="fas fa-sync-alt"></i></div>
                                    <h4 className="font-bold text-slate-800 mb-3 text-lg">Value Must Evolve</h4>
                                    <p className="text-sm text-slate-600 leading-relaxed">Your value as a foreign partner must evolve. To stay relevant and justify royalties over time, you must control a dynamic asset (like global R&D or an exclusive digital platform) that the local partner cannot easily copy.</p>
                                </div>
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                                    <div className="w-12 h-12 bg-red-50 text-red-600 rounded-full flex items-center justify-center mb-5 text-xl border border-red-100"><i className="fas fa-link-slash"></i></div>
                                    <h4 className="font-bold text-slate-800 mb-3 text-lg">Supply Chain Risks</h4>
                                    <p className="text-sm text-slate-600 leading-relaxed">Letting the local partner manage the entire supply chain is highly risky. This allows them to capture profits internally (via transfer pricing to their own factories) before the money ever reaches the Joint Venture's bank account.</p>
                                </div>
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                                    <div className="w-12 h-12 bg-slate-100 text-slate-600 rounded-full flex items-center justify-center mb-5 text-xl border border-slate-200"><i className="fas fa-file-contract"></i></div>
                                    <h4 className="font-bold text-slate-800 mb-3 text-lg">Effective Divorce Clauses</h4>
                                    <p className="text-sm text-slate-600 leading-relaxed">JVs need practical 'divorce' clauses for when trust breaks down. Standard winding-up (dissolution) clauses are incredibly slow, expensive, and legally difficult to force on a financially successful enterprise.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                  )}

                </div>
              );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
    </script>
